<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bononi — WhatsApp Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --surface3: #21262d;
    --border: #30363d;
    --green: #3fb950;
    --green-bg: rgba(63,185,80,.12);
    --red: #f85149;
    --red-bg: rgba(248,81,73,.12);
    --yellow: #d29922;
    --yellow-bg: rgba(210,153,34,.12);
    --blue: #58a6ff;
    --blue-bg: rgba(88,166,255,.1);
    --text: #e6edf3;
    --text-sec: #8b949e;
    --text-muted: #484f58;
    --wa: #25D366;
    --radius: 8px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .header-logo svg { color: var(--wa); }
  .header-title { color: var(--text-sec); font-size: 13px; font-weight: 400; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .btn-refresh {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: var(--radius-sm);
    background: var(--surface3); border: 1px solid var(--border);
    color: var(--text-sec); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .15s;
  }
  .btn-refresh:hover { background: var(--surface); color: var(--text); }

  /* LAYOUT PRINCIPAL */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR — INSTÂNCIAS */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-title {
    padding: 14px 16px 10px;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    border-bottom: 1px solid var(--border);
  }
  .inst-list { flex: 1; overflow-y: auto; padding: 8px; }
  .inst-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background .12s;
    margin-bottom: 2px;
  }
  .inst-item:hover { background: var(--surface2); }
  .inst-item.active { background: var(--surface3); }
  .inst-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .inst-dot.on { background: var(--green); box-shadow: 0 0 6px rgba(63,185,80,.5); }
  .inst-dot.off { background: var(--text-muted); }
  .inst-name { font-size: 13px; font-weight: 500; flex: 1; }
  .inst-badge {
    font-size: 10px; font-weight: 700;
    background: var(--red); color: #fff;
    padding: 1px 6px; border-radius: 10px;
    min-width: 18px; text-align: center;
  }
  .inst-count { font-size: 10px; color: var(--text-muted); }

  /* LISTA DE CONVERSAS */
  .conv-panel {
    width: 300px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .conv-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .conv-search {
    flex: 1;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    color: var(--text);
    font-size: 12px;
    outline: none;
    font-family: inherit;
  }
  .conv-search::placeholder { color: var(--text-muted); }
  .conv-search:focus { border-color: var(--blue); }
  .conv-list { flex: 1; overflow-y: auto; }
  .conv-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .12s;
  }
  .conv-item:hover { background: var(--surface2); }
  .conv-item.active { background: var(--surface3); border-left: 2px solid var(--wa); }
  .conv-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface3);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: var(--text-sec);
    flex-shrink: 0; text-transform: uppercase;
  }
  .conv-info { flex: 1; min-width: 0; }
  .conv-nome {
    font-size: 13px; font-weight: 600; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .conv-preview {
    font-size: 11px; color: var(--text-sec);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-top: 2px;
  }
  .conv-meta { text-align: right; flex-shrink: 0; }
  .conv-time { font-size: 10px; color: var(--text-muted); }
  .conv-unread {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--wa); color: #fff;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    margin-top: 4px; margin-left: auto;
  }
  .conv-empty {
    padding: 40px 20px; text-align: center; color: var(--text-muted);
    font-size: 13px;
  }

  /* CHAT */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }
  .chat-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .chat-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface3);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--text-sec);
    text-transform: uppercase;
  }
  .chat-nome { font-size: 14px; font-weight: 600; }
  .chat-tel { font-size: 11px; color: var(--text-sec); }
  .chat-inst-badge {
    margin-left: auto;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px; font-weight: 600;
    background: var(--green-bg); color: var(--green);
    border: 1px solid rgba(63,185,80,.2);
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .msg-date-label {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 3px 10px;
    border-radius: 10px;
    align-self: center;
    margin: 10px 0 4px;
  }

  .msg-wrapper {
    display: flex;
    flex-direction: column;
    max-width: 65%;
  }
  .msg-wrapper.de-mim { align-self: flex-end; align-items: flex-end; }
  .msg-wrapper.de-fora { align-self: flex-start; align-items: flex-start; }

  .msg-bubble {
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
  }
  .de-mim .msg-bubble {
    background: #1a4731;
    color: #e6edf3;
    border-bottom-right-radius: 4px;
  }
  .de-fora .msg-bubble {
    background: var(--surface2);
    color: var(--text);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }
  .msg-time {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
    padding: 0 4px;
  }

  .msg-tipo-icon { font-size: 11px; margin-right: 4px; color: var(--text-sec); }

  .chat-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 12px;
  }
  .chat-empty svg { opacity: .3; }
  .chat-empty p { font-size: 13px; }

  /* PAINEL QR CODE */
  .qr-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px;
  }
  .qr-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    max-width: 360px;
    width: 100%;
  }
  .qr-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
  .qr-box p { font-size: 12px; color: var(--text-sec); margin-bottom: 16px; line-height: 1.6; }
  .qr-img { width: 200px; height: 200px; margin: 0 auto 16px; border-radius: var(--radius-sm); background: #fff; display: flex; align-items: center; justify-content: center; }
  .btn-connect {
    width: 100%;
    padding: 10px;
    background: var(--wa);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .15s;
  }
  .btn-connect:hover { opacity: .85; }
  .btn-connect:disabled { opacity: .5; cursor: not-allowed; }

  /* LOADING */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* LOGIN */
  #login-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px;
    width: 340px;
    text-align: center;
  }
  .login-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .login-box p { font-size: 13px; color: var(--text-sec); margin-bottom: 24px; }
  .login-input {
    width: 100%; padding: 10px 12px;
    background: var(--surface3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-size: 13px; font-family: inherit; outline: none;
    margin-bottom: 10px;
  }
  .login-input:focus { border-color: var(--wa); }
  .btn-login {
    width: 100%; padding: 10px;
    background: var(--wa); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .login-error { font-size: 12px; color: var(--red); margin-top: 8px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div style="font-size:32px;margin-bottom:12px">📱</div>
    <h2>Bononi WhatsApp</h2>
    <p>Acesse para monitorar as conversas da equipe</p>
    <input class="login-input" type="password" id="login-key" placeholder="Senha de acesso" />
    <button class="btn-login" onclick="fazerLogin()">Entrar</button>
    <p class="login-error" id="login-err"></p>
  </div>
</div>

<!-- APP -->
<div class="header">
  <div class="header-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    WhatsApp Manager
  </div>
  <span class="header-title">Bononi Acessórios</span>
  <div class="header-right">
    <span id="last-update" style="font-size:11px;color:var(--text-muted)"></span>
    <button class="btn-refresh" onclick="recarregar()">
      <span id="refresh-icon">↻</span> Atualizar
    </button>
  </div>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">Instâncias</div>
    <div class="inst-list" id="inst-list">
      <div style="padding:20px;text-align:center"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- CONVERSAS -->
  <div class="conv-panel">
    <div class="conv-header">
      <input class="conv-search" type="text" placeholder="Buscar conversa..." oninput="filtrarConversas(this.value)" />
    </div>
    <div class="conv-list" id="conv-list">
      <div class="conv-empty">Selecione uma instância</div>
    </div>
  </div>

  <!-- CHAT / QR -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" color="#8b949e">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
      </svg>
      <p>Selecione uma conversa para ver as mensagens</p>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────
const SUPA_URL = 'https://vishxwdxqiygbxmtpfoy.supabase.co'
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpc2h4d2R4cWl5Z2J4bXRwZm95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYxMjYyMjgsImV4cCI6MjA2MTcwMjIyOH0.dPMBb_IjF5tXMxGiOUFViKgXxJkr_2pO18dXOBCGfYU'
const EVO_URL = 'https://evolution.stonni.com.br'
const EVO_KEY = 'evo_StayCloud2026SecureKeyXzP9'
const SENHA   = 'bononi2026'

// Estado
let instancias = []
let instSel = null
let conversas = []
let convSel = null
let mensagens = []
let autoRefresh = null

// ── LOGIN ────────────────────────────────────────────────────────────
function fazerLogin() {
  const v = document.getElementById('login-key').value
  if (v === SENHA) {
    document.getElementById('login-screen').style.display = 'none'
    iniciar()
  } else {
    document.getElementById('login-err').textContent = 'Senha incorreta'
  }
}
document.getElementById('login-key').addEventListener('keydown', e => {
  if (e.key === 'Enter') fazerLogin()
})

// ── INIT ─────────────────────────────────────────────────────────────
async function iniciar() {
  await carregarInstancias()
  autoRefresh = setInterval(recarregar, 30000)
}

async function recarregar() {
  document.getElementById('refresh-icon').style.animation = 'spin .7s linear infinite'
  await carregarInstancias()
  if (instSel) await carregarConversas(instSel)
  if (convSel) await carregarMensagens(instSel, convSel.telefone)
  document.getElementById('refresh-icon').style.animation = ''
  document.getElementById('last-update').textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})
}

// ── INSTÂNCIAS ────────────────────────────────────────────────────────
async function carregarInstancias() {
  try {
    const r = await fetch(`${EVO_URL}/instance/fetchInstances`, {
      headers: { apikey: EVO_KEY }
    })
    const data = await r.json()
    instancias = Array.isArray(data) ? data : []
  } catch(e) {
    instancias = []
  }

  // Contar conversas por instância
  const counts = {}
  try {
    const r2 = await sbQ('wm_conversas', 'select=instancia')
    ;(Array.isArray(r2) ? r2 : []).forEach(c => {
      counts[c.instancia] = (counts[c.instancia] || 0) + 1
    })
  } catch(e) {}

  renderInstancias(counts)
}

function renderInstancias(counts) {
  const el = document.getElementById('inst-list')
  if (!instancias.length) {
    el.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--text-muted);text-align:center">Nenhuma instância</div>'
    return
  }

  const NOMES = {
    vendedor1: 'Ana Julia', vendedor2: 'Guilherme',
    vendedor3: 'Iguimar', vendedor4: 'João',
    stonni: 'Stonni Geral', assistencia: 'Assistência'
  }

  el.innerHTML = instancias.map(inst => {
    const nome = inst.instance?.instanceName || inst.instanceName || ''
    const status = inst.instance?.status || inst.status || 'close'
    const connected = status === 'open'
    const label = NOMES[nome] || nome
    const count = counts[nome] || 0
    const isSel = instSel === nome

    return `<div class="inst-item${isSel?' active':''}" onclick="selecionarInstancia('${nome}')">
      <div class="inst-dot ${connected?'on':'off'}"></div>
      <span class="inst-name">${label}</span>
      ${count ? `<span class="inst-count">${count}</span>` : ''}
    </div>`
  }).join('')
}

async function selecionarInstancia(nome) {
  instSel = nome
  convSel = null
  renderInstancias({})
  await carregarInstancias()

  const inst = instancias.find(i => (i.instance?.instanceName || i.instanceName) === nome)
  const status = inst?.instance?.status || inst?.status || 'close'

  if (status !== 'open') {
    mostrarQR(nome)
  } else {
    await carregarConversas(nome)
  }
}

// ── QR CODE ───────────────────────────────────────────────────────────
async function mostrarQR(nome) {
  const panel = document.getElementById('chat-panel')
  panel.innerHTML = `<div class="qr-panel">
    <div class="qr-box">
      <h3>📱 Conectar ${nome}</h3>
      <p>Esta instância está desconectada. Gere o QR Code e escaneie com o WhatsApp do celular.</p>
      <button class="btn-connect" id="btn-qr" onclick="gerarQR('${nome}')">Gerar QR Code</button>
    </div>
  </div>`
}

async function gerarQR(nome) {
  const btn = document.getElementById('btn-qr')
  btn.textContent = 'Gerando...'
  btn.disabled = true

  try {
    const r = await fetch(`${EVO_URL}/instance/connect/${nome}`, {
      headers: { apikey: EVO_KEY }
    })
    const data = await r.json()
    const qrBase64 = data?.base64 || data?.qrcode?.base64

    const panel = document.getElementById('chat-panel')
    if (qrBase64) {
      panel.innerHTML = `<div class="qr-panel">
        <div class="qr-box">
          <h3>📱 Escaneie o QR Code</h3>
          <p>Abra o WhatsApp → Configurações → Aparelhos conectados → Conectar aparelho</p>
          <div class="qr-img"><img src="${qrBase64}" style="width:200px;height:200px;border-radius:6px"></div>
          <button class="btn-connect" onclick="gerarQR('${nome}')">↻ Novo QR Code</button>
        </div>
      </div>`
    } else {
      panel.innerHTML = `<div class="qr-panel">
        <div class="qr-box">
          <h3>⚠️ Erro ao gerar QR</h3>
          <p>Não foi possível gerar o QR Code. Tente novamente.</p>
          <button class="btn-connect" onclick="gerarQR('${nome}')">Tentar novamente</button>
        </div>
      </div>`
    }
  } catch(e) {
    document.getElementById('chat-panel').innerHTML = `<div class="qr-panel">
      <div class="qr-box">
        <h3>⚠️ Erro de conexão</h3>
        <p>${e.message}</p>
        <button class="btn-connect" onclick="gerarQR('${nome}')">Tentar novamente</button>
      </div>
    </div>`
  }
}

// ── CONVERSAS ─────────────────────────────────────────────────────────
async function carregarConversas(instancia) {
  const el = document.getElementById('conv-list')
  el.innerHTML = '<div style="padding:20px;text-align:center"><div class="spinner"></div></div>'

  const data = await sbQ('wm_conversas',
    `select=*&instancia=eq.${instancia}&order=ultimo_contato.desc&limit=200`)
  conversas = Array.isArray(data) ? data : []
  renderConversas(conversas)
}

function renderConversas(lista) {
  const el = document.getElementById('conv-list')
  if (!lista.length) {
    el.innerHTML = '<div class="conv-empty">Nenhuma conversa ainda.<br>Aguardando mensagens...</div>'
    return
  }

  el.innerHTML = lista.map(c => {
    const isSel = convSel?.telefone === c.telefone && convSel?.instancia === c.instancia
    const inicial = (c.nome_contato || c.telefone || '?')[0].toUpperCase()
    const hora = c.ultimo_contato ? fmtHora(c.ultimo_contato) : ''
    const preview = c.ultima_mensagem || ''

    return `<div class="conv-item${isSel?' active':''}"
      onclick="selecionarConversa('${c.telefone}','${esc(c.nome_contato||c.telefone)}')">
      <div class="conv-avatar">${inicial}</div>
      <div class="conv-info">
        <div class="conv-nome">${c.nome_contato || fmtTel(c.telefone)}</div>
        <div class="conv-preview">${preview}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${hora}</div>
      </div>
    </div>`
  }).join('')
}

function filtrarConversas(q) {
  if (!q) { renderConversas(conversas); return; }
  const lq = q.toLowerCase()
  renderConversas(conversas.filter(c =>
    (c.nome_contato||'').toLowerCase().includes(lq) ||
    (c.telefone||'').includes(lq)
  ))
}

// ── MENSAGENS ─────────────────────────────────────────────────────────
async function selecionarConversa(telefone, nome) {
  convSel = { telefone, nome, instancia: instSel }
  renderConversas(conversas)
  await carregarMensagens(instSel, telefone)
}

async function carregarMensagens(instancia, telefone) {
  const panel = document.getElementById('chat-panel')

  // Header
  const inicial = (convSel?.nome || telefone)[0].toUpperCase()
  const NOMES = { vendedor1:'Ana Julia', vendedor2:'Guilherme', vendedor3:'Iguimar', vendedor4:'João', stonni:'Stonni Geral', assistencia:'Assistência' }

  panel.innerHTML = `
    <div class="chat-header">
      <div class="chat-avatar">${inicial}</div>
      <div>
        <div class="chat-nome">${convSel?.nome || fmtTel(telefone)}</div>
        <div class="chat-tel">${fmtTel(telefone)}</div>
      </div>
      <span class="chat-inst-badge">${NOMES[instancia] || instancia}</span>
    </div>
    <div class="chat-messages" id="chat-msgs">
      <div style="text-align:center;padding:20px"><div class="spinner"></div></div>
    </div>`

  const data = await sbQ('wm_mensagens',
    `select=*&instancia=eq.${instancia}&telefone=eq.${telefone}&order=timestamp.asc&limit=500`)
  mensagens = Array.isArray(data) ? data : []
  renderMensagens()
}

function renderMensagens() {
  const el = document.getElementById('chat-msgs')
  if (!el) return

  if (!mensagens.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px">Nenhuma mensagem salva ainda</div>'
    return
  }

  let html = ''
  let ultimaData = ''

  mensagens.forEach(m => {
    const dt = new Date(m.timestamp)
    const dataLabel = dt.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'})
    if (dataLabel !== ultimaData) {
      html += `<div class="msg-date-label">${dataLabel}</div>`
      ultimaData = dataLabel
    }

    const deMim = m.de_mim
    const hora = dt.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})
    const icone = { image:'📷', video:'🎥', audio:'🎵', document:'📄', sticker:'😊', location:'📍', contact:'👤' }[m.tipo] || ''

    html += `<div class="msg-wrapper ${deMim?'de-mim':'de-fora'}">
      <div class="msg-bubble">
        ${icone?`<span class="msg-tipo-icon">${icone}</span>`:''}${m.conteudo || ''}
      </div>
      <span class="msg-time">${hora}</span>
    </div>`
  })

  el.innerHTML = html
  el.scrollTop = el.scrollHeight
}

// ── HELPERS ───────────────────────────────────────────────────────────
async function sbQ(table, params = '') {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}&limit=9999`, {
    headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
  })
  return r.json()
}

function esc(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;') }

function fmtTel(t) {
  const d = (t||'').replace(/\D/g,'')
  if (d.length === 13) return `(${d.slice(2,4)}) ${d.slice(4,9)}-${d.slice(9)}`
  if (d.length === 12) return `(${d.slice(2,4)}) ${d.slice(4,8)}-${d.slice(8)}`
  return t
}

function fmtHora(iso) {
  const dt = new Date(iso)
  const hoje = new Date()
  const diff = hoje - dt
  if (diff < 86400000 && dt.getDate() === hoje.getDate())
    return dt.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})
  if (diff < 604800000)
    return dt.toLocaleDateString('pt-BR', {weekday:'short'})
  return dt.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'})
}
