<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bononi — WhatsApp Manager</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--surface3:#21262d;
    --border:#30363d;--green:#3fb950;--red:#f85149;--red-bg:rgba(248,81,73,.12);
    --blue:#58a6ff;--text:#e6edf3;--text-sec:#8b949e;--text-muted:#484f58;
    --wa:#25D366;--radius:8px;--radius-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* LOGIN */
  #login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px;width:340px;text-align:center}
  .login-box h2{font-size:18px;font-weight:700;margin-bottom:6px}
  .login-box p{font-size:13px;color:var(--text-sec);margin-bottom:24px}
  .login-input{width:100%;padding:10px 12px;background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:inherit;outline:none;margin-bottom:10px}
  .login-input:focus{border-color:var(--wa)}
  .btn-login{width:100%;padding:10px;background:var(--wa);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
  .login-error{font-size:12px;color:var(--red);margin-top:8px}

  /* HEADER */
  .header{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .header-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700}
  .wa-icon{color:var(--wa)}
  .header-sub{color:var(--text-sec);font-size:13px}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .btn-hub{font-size:11px;font-weight:600;color:var(--text-sec);background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;cursor:pointer;text-decoration:none}
  .btn-refresh{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius-sm);background:var(--surface3);border:1px solid var(--border);color:var(--text-sec);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
  .btn-refresh:hover{background:var(--surface2);color:var(--text)}
  .user-name{font-size:12px;color:var(--text-muted)}

  /* LAYOUT */
  .main{display:flex;flex:1;overflow:hidden}

  /* SIDEBAR */
  .sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column}
  .sidebar-title{padding:14px 16px 10px;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border)}
  .inst-list{flex:1;overflow-y:auto;padding:8px}
  .inst-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .12s;margin-bottom:2px}
  .inst-item:hover{background:var(--surface2)}
  .inst-item.active{background:var(--surface3)}
  .inst-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .inst-dot.on{background:var(--green);box-shadow:0 0 6px rgba(63,185,80,.5)}
  .inst-dot.off{background:var(--text-muted)}
  .inst-name{font-size:13px;font-weight:500;flex:1}
  .inst-count{font-size:10px;color:var(--text-muted)}

  /* CONVERSAS */
  .conv-panel{width:300px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column}
  .conv-header{padding:12px 14px;border-bottom:1px solid var(--border)}
  .conv-search{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
  .conv-search::placeholder{color:var(--text-muted)}
  .conv-search:focus{border-color:var(--blue)}
  .conv-list{flex:1;overflow-y:auto}
  .conv-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
  .conv-item:hover{background:var(--surface2)}
  .conv-item.active{background:var(--surface3);border-left:2px solid var(--wa)}
  .conv-avatar{width:40px;height:40px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--text-sec);flex-shrink:0;text-transform:uppercase}
  .conv-info{flex:1;min-width:0}
  .conv-nome{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .conv-preview{font-size:11px;color:var(--text-sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
  .conv-time{font-size:10px;color:var(--text-muted);flex-shrink:0}
  .conv-empty{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:13px}

  /* CHAT */
  .chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .chat-header{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px;flex-shrink:0}
  .chat-avatar{width:36px;height:36px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--text-sec);text-transform:uppercase}
  .chat-nome{font-size:14px;font-weight:600}
  .chat-tel{font-size:11px;color:var(--text-sec)}
  .chat-inst-badge{margin-left:auto;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:rgba(37,211,102,.12);color:var(--wa);border:1px solid rgba(37,211,102,.2)}
  .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:4px}
  .msg-date-label{text-align:center;font-size:10px;color:var(--text-muted);background:var(--surface2);padding:3px 10px;border-radius:10px;align-self:center;margin:10px 0 4px}
  .msg-wrapper{display:flex;flex-direction:column;max-width:65%}
  .msg-wrapper.de-mim{align-self:flex-end;align-items:flex-end}
  .msg-wrapper.de-fora{align-self:flex-start;align-items:flex-start}
  .msg-bubble{padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5;word-break:break-word}
  .de-mim .msg-bubble{background:#1a4731;color:#e6edf3;border-bottom-right-radius:4px}
  .de-fora .msg-bubble{background:var(--surface2);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
  .msg-time{font-size:10px;color:var(--text-muted);margin-top:3px;padding:0 4px}
  .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);gap:12px}
  .chat-empty p{font-size:13px}

  /* QR */
  .qr-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px}
  .qr-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center;max-width:360px;width:100%}
  .qr-box h3{font-size:15px;font-weight:600;margin-bottom:8px}
  .qr-box p{font-size:12px;color:var(--text-sec);margin-bottom:16px;line-height:1.6}
  .qr-img{width:200px;height:200px;margin:0 auto 16px;border-radius:var(--radius-sm);background:#fff;display:flex;align-items:center;justify-content:center}
  .btn-connect{width:100%;padding:10px;background:var(--wa);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
  .btn-connect:hover{opacity:.85}
  .btn-connect:disabled{opacity:.5;cursor:not-allowed}

  .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div style="font-size:32px;margin-bottom:12px">📱</div>
    <h2>Bononi WhatsApp</h2>
    <p>Use o mesmo login do Portal Bononi</p>
    <input class="login-input" type="email" id="login-email" placeholder="seu@email.com" />
    <input class="login-input" type="password" id="login-senha" placeholder="Senha" />
    <button class="btn-login" onclick="fazerLogin()">Entrar</button>
    <p class="login-error" id="login-err"></p>
  </div>
</div>

<!-- APP -->
<div class="header">
  <div class="header-logo">
    <span class="wa-icon">📱</span> WhatsApp Manager
  </div>
  <span class="header-sub">Bononi Acessórios</span>
  <div class="header-right">
    <span class="user-name" id="user-name"></span>
    <a href="https://bononi-hub.vercel.app/" class="btn-hub">↩ Portal</a>
    <span id="last-update" style="font-size:11px;color:var(--text-muted)"></span>
    <button class="btn-refresh" onclick="recarregar()">↻ Atualizar</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-title">Instâncias</div>
    <div class="inst-list" id="inst-list"><div style="padding:20px;text-align:center"><div class="spinner"></div></div></div>
  </div>
  <div class="conv-panel">
    <div class="conv-header">
      <input class="conv-search" type="text" placeholder="Buscar conversa..." oninput="filtrarConversas(this.value)" />
    </div>
    <div class="conv-list" id="conv-list"><div class="conv-empty">Selecione uma instância</div></div>
  </div>
  <div class="chat-panel" id="chat-panel">
    <div class="chat-empty">
      <div style="font-size:40px;opacity:.3">💬</div>
      <p>Selecione uma conversa para ver as mensagens</p>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://vishxwdxqiygbxmtpfoy.supabase.co'
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpc2h4d2R4cWl5Z2J4bXRwZm95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Njg2MjIsImV4cCI6MjA4ODA0NDYyMn0.J647m3ieDHahNQYBWMRESl0aPFXsT_zt_7ZcDvyB-SA'
const PROXY   = `${SUPA_URL}/functions/v1/evo-proxy`
const sb = supabase.createClient(SUPA_URL, SUPA_KEY)

const NOMES = {
  vendedor1:'Ana Julia', vendedor2:'Guilherme',
  vendedor3:'Iguimar', vendedor4:'João',
  stonni:'Stonni Geral', assistencia:'Assistência'
}

let session = null
let instancias = []
let instSel = null
let conversas = []
let convSel = null

// ── AUTH ──────────────────────────────────────────────────────────────
async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim()
  const senha = document.getElementById('login-senha').value
  const err   = document.getElementById('login-err')
  err.textContent = ''

  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha })
  if (error) { err.textContent = 'E-mail ou senha incorretos'; return }

  const meta = data.user.user_metadata || {}
  if (!meta.admin && !(meta.modulos||[]).includes('wp')) {
    err.textContent = 'Sem acesso a este módulo. Fale com o administrador.'
    await sb.auth.signOut()
    return
  }

  session = data.session
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('user-name').textContent = meta.nome || email
  iniciar()
}

document.getElementById('login-senha').addEventListener('keydown', e => {
  if (e.key === 'Enter') fazerLogin()
})

// Verificar sessão existente
;(async () => {
  const { data: { session: s } } = await sb.auth.getSession()
  if (s) {
    const meta = s.user.user_metadata || {}
    if (meta.admin || (meta.modulos||[]).includes('wp')) {
      session = s
      document.getElementById('login-screen').style.display = 'none'
      document.getElementById('user-name').textContent = meta.nome || s.user.email
      iniciar()
    }
  }
})()

// ── INIT ──────────────────────────────────────────────────────────────
async function iniciar() {
  await carregarInstancias()
  setInterval(recarregar, 30000)
}

async function recarregar() {
  await carregarInstancias()
  if (instSel) await carregarConversas(instSel)
  document.getElementById('last-update').textContent =
    'Atualizado ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
}

// ── PROXY PARA EVOLUTION API ──────────────────────────────────────────
async function evoGet(path) {
  const r = await fetch(`${PROXY}?path=${encodeURIComponent(path)}&method=GET`, {
    headers: { Authorization: `Bearer ${session.access_token}`, apikey: SUPA_KEY }
  })
  return r.json()
}

// ── INSTÂNCIAS ────────────────────────────────────────────────────────
async function carregarInstancias() {
  // Lista fixa de instâncias conhecidas
  const INSTANCIAS_CONHECIDAS = [
    { nome: 'vendedor1', label: 'Ana Julia' },
    { nome: 'vendedor2', label: 'Guilherme' },
    { nome: 'vendedor3', label: 'Iguimar' },
    { nome: 'vendedor4', label: 'João' },
    { nome: 'stonni',    label: 'Stonni Geral' },
    { nome: 'assistencia', label: 'Assistência' },
  ]

  // Verificar status de cada instância via proxy
  const statusMap = {}
  try {
    const data = await evoGet('/instance/fetchInstances')
    const arr = Array.isArray(data) ? data : (data?.instances ? Object.values(data.instances) : [])
    arr.forEach(inst => {
      const nome = inst?.instance?.instanceName || inst?.instanceName || inst?.name || ''
      const status = inst?.instance?.status || inst?.status || inst?.connectionStatus || 'close'
      if (nome) statusMap[nome] = status
    })
  } catch(e) { console.warn('fetchInstances falhou:', e) }

  // Montar lista com status
  instancias = INSTANCIAS_CONHECIDAS.map(i => ({
    instanceName: i.nome,
    label: i.label,
    status: statusMap[i.nome] || 'close'
  }))

  renderInstancias()
}

function renderInstancias() {
  const el = document.getElementById('inst-list')
  if (!instancias.length) {
    el.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--text-muted);text-align:center">Sem instâncias</div>'
    return
  }
  el.innerHTML = instancias.map(inst => {
    const nome   = inst.instanceName || ''
    const status = inst.status || 'close'
    const conn   = status === 'open'
    const label  = inst.label || NOMES[nome] || nome
    const isSel  = instSel === nome
    return `<div class="inst-item${isSel?' active':''}" onclick="selecionarInstancia('${nome}')">
      <div class="inst-dot ${conn?'on':'off'}"></div>
      <span class="inst-name">${label}</span>
    </div>`
  }).join('')
}

async function selecionarInstancia(nome) {
  instSel = nome
  convSel = null
  renderInstancias()
  const inst   = instancias.find(i => i.instanceName === nome)
  const status = inst?.status || 'close'
  if (status !== 'open') {
    mostrarQR(nome)
  } else {
    await carregarConversas(nome)
  }
}

// ── QR ────────────────────────────────────────────────────────────────
function mostrarQR(nome) {
  document.getElementById('chat-panel').innerHTML = `<div class="qr-panel">
    <div class="qr-box">
      <h3>📱 Conectar ${NOMES[nome]||nome}</h3>
      <p>Esta instância está desconectada.<br>Gere o QR Code e escaneie com o WhatsApp.</p>
      <button class="btn-connect" id="btn-qr" onclick="gerarQR('${nome}')">Gerar QR Code</button>
    </div>
  </div>`
}

async function gerarQR(nome) {
  const btn = document.getElementById('btn-qr')
  if (btn) { btn.textContent = 'Gerando...'; btn.disabled = true }
  try {
    const data = await evoGet(`/instance/connect/${nome}`)
    const qr   = data?.base64 || data?.qrcode?.base64
    document.getElementById('chat-panel').innerHTML = qr
      ? `<div class="qr-panel"><div class="qr-box">
          <h3>📱 Escaneie o QR Code</h3>
          <p>WhatsApp → Configurações → Aparelhos conectados → Conectar aparelho</p>
          <div class="qr-img"><img src="${qr}" style="width:200px;height:200px;border-radius:6px"></div>
          <button class="btn-connect" onclick="gerarQR('${nome}')">↻ Novo QR Code</button>
         </div></div>`
      : `<div class="qr-panel"><div class="qr-box">
          <h3>⚠️ Erro ao gerar QR</h3>
          <p>Tente novamente.</p>
          <button class="btn-connect" onclick="gerarQR('${nome}')">Tentar novamente</button>
         </div></div>`
  } catch(e) {
    document.getElementById('chat-panel').innerHTML = `<div class="qr-panel"><div class="qr-box">
      <h3>⚠️ Erro</h3><p>${e.message}</p>
      <button class="btn-connect" onclick="gerarQR('${nome}')">Tentar novamente</button>
    </div></div>`
  }
}

// ── CONVERSAS ─────────────────────────────────────────────────────────
async function carregarConversas(instancia) {
  document.getElementById('conv-list').innerHTML =
    '<div style="padding:20px;text-align:center"><div class="spinner"></div></div>'
  const data = await sbQ('wm_conversas',
    `select=*&instancia=eq.${instancia}&order=ultimo_contato.desc`)
  conversas = Array.isArray(data) ? data : []
  renderConversas(conversas)
}

function renderConversas(lista) {
  const el = document.getElementById('conv-list')
  if (!lista.length) {
    el.innerHTML = '<div class="conv-empty">Nenhuma conversa ainda.<br>Aguardando mensagens...</div>'
    return
  }
  el.innerHTML = lista.map(c => {
    const isSel = convSel?.telefone === c.telefone
    const ini   = (c.nome_contato||c.telefone||'?')[0].toUpperCase()
    return `<div class="conv-item${isSel?' active':''}"
      onclick="selecionarConversa('${c.telefone}','${esc(c.nome_contato||c.telefone)}')">
      <div class="conv-avatar">${ini}</div>
      <div class="conv-info">
        <div class="conv-nome">${c.nome_contato||fmtTel(c.telefone)}</div>
        <div class="conv-preview">${c.ultima_mensagem||''}</div>
      </div>
      <span class="conv-time">${c.ultimo_contato?fmtHora(c.ultimo_contato):''}</span>
    </div>`
  }).join('')
}

function filtrarConversas(q) {
  if (!q) { renderConversas(conversas); return }
  const lq = q.toLowerCase()
  renderConversas(conversas.filter(c =>
    (c.nome_contato||'').toLowerCase().includes(lq) || (c.telefone||'').includes(lq)
  ))
}

// ── CHAT ──────────────────────────────────────────────────────────────
async function selecionarConversa(telefone, nome) {
  convSel = { telefone, nome }
  renderConversas(conversas)
  const ini = nome[0].toUpperCase()
  document.getElementById('chat-panel').innerHTML = `
    <div class="chat-header">
      <div class="chat-avatar">${ini}</div>
      <div><div class="chat-nome">${nome}</div><div class="chat-tel">${fmtTel(telefone)}</div></div>
      <span class="chat-inst-badge">${NOMES[instSel]||instSel}</span>
    </div>
    <div class="chat-messages" id="chat-msgs">
      <div style="text-align:center;padding:20px"><div class="spinner"></div></div>
    </div>`

  const data = await sbQ('wm_mensagens',
    `select=*&instancia=eq.${instSel}&telefone=eq.${telefone}&order=timestamp.asc`)
  const msgs = Array.isArray(data) ? data : []
  const el   = document.getElementById('chat-msgs')
  if (!el) return

  if (!msgs.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px">Nenhuma mensagem salva</div>'
    return
  }

  let html = '', ultimaData = ''
  msgs.forEach(m => {
    const dt  = new Date(m.timestamp)
    const dl  = dt.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})
    if (dl !== ultimaData) { html += `<div class="msg-date-label">${dl}</div>`; ultimaData = dl }
    const hora = dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
    const ico  = {image:'📷',video:'🎥',audio:'🎵',document:'📄',sticker:'😊',location:'📍'}[m.tipo]||''
    html += `<div class="msg-wrapper ${m.de_mim?'de-mim':'de-fora'}">
      <div class="msg-bubble">${ico?`<span style="margin-right:4px">${ico}</span>`:''}${m.conteudo||''}</div>
      <span class="msg-time">${hora}</span>
    </div>`
  })
  el.innerHTML = html
  el.scrollTop = el.scrollHeight
}

// ── HELPERS ───────────────────────────────────────────────────────────
async function sbQ(table, params='') {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}&limit=9999`, {
    headers: { apikey: SUPA_KEY, Authorization: `Bearer ${session?.access_token||SUPA_KEY}` }
  })
  return r.json()
}

function esc(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;') }

function fmtTel(t) {
  const d = (t||'').replace(/\D/g,'')
  if (d.length===13) return `(${d.slice(2,4)}) ${d.slice(4,9)}-${d.slice(9)}`
  if (d.length===12) return `(${d.slice(2,4)}) ${d.slice(4,8)}-${d.slice(8)}`
  return t
}

function fmtHora(iso) {
  const dt = new Date(iso), hoje = new Date(), diff = hoje - dt
  if (diff < 86400000 && dt.getDate()===hoje.getDate())
    return dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
  if (diff < 604800000) return dt.toLocaleDateString('pt-BR',{weekday:'short'})
  return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})
}
